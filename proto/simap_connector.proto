syntax = "proto3";
package simap_connector;

import "context.proto";

// Subscription handling according to https://datatracker.ietf.org/doc/html/rfc8641

service SimapConnectorService {
  rpc EstablishSubscription  (Subscription  ) returns (SubscriptionId) {}
  rpc DeleteSubscription     (SubscriptionId) returns (context.Empty ) {}
  rpc AffectSampleSynthesizer(Affectation   ) returns (context.Empty ) {}
}

message SubscriptionId {
  uint64 subscription_id = 1;
}

message Subscription {
  string datastore    = 1;
  string xpath_filter = 2;
  float  period       = 3;
}

message Affectation {
  string network_id       = 1;
  string link_id          = 2;
  float  bandwidth_factor = 3;
  float  latency_factor   = 4;
}
