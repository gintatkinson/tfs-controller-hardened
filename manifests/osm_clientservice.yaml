apiVersion: apps/v1
kind: Deployment
metadata:
  name: osm-clientservice
spec:
  selector:
    matchLabels:
      app: osm-clientservice
  #replicas: 1
  template:
    metadata:
      labels:
        app: osm-clientservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: labs.etsi.org:5050/tfs/controller/osm_client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 30210
            - containerPort: 9192
          env:
            - name: OSM_ADDRESS
              value: "127.0.0.1"
            - name: OSM_PORT
              value: "80"
            - name: OSM_USERNAME
              value: "admin"
            - name: OSM_PASSWORD
              value: "admin"
            - name: OSM_PROJECT
              value: "admin"
            - name: OSM_VERIFY_TLS
              value: "FALSE"
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:30210"]
          livenessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:30210"]
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: osm-clientservice
  labels:
    app: osm-clientservice
spec:
  type: ClusterIP
  selector:
    app: osm-clientservice
  ports:
    - name: grpc
      protocol: TCP
      port: 30210
      targetPort: 30210
    - name: metrics
      protocol: TCP
      port: 9192
      targetPort: 9192
