apiVersion: apps/v1
kind: Deployment
metadata:
  name: ztp_serverservice
spec:
  selector:
    matchLabels:
      app: ztp_serverservice
  #replicas: 1
  template:
    metadata:
      labels:
        app: ztp_serverservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: labs.etsi.org:5050/tfs/controller/ztp_server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8005
            - containerPort: 5051
            - containerPort: 9192
          env:
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:5051"]
          livenessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:5051"]
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ztp_serverservice
  labels:
    app: ztp_serverservice
spec:
  type: ClusterIP
  selector:
    app: ztp_serverservice
  ports:
    - name: http
      protocol: TCP
      port: 8005
      targetPort: 8005
    - name: grpc
      protocol: TCP
      port: 5051
      targetPort: 5051
    - name: metrics
      protocol: TCP
      port: 9192
      targetPort: 9192
