apiVersion: apps/v1
kind: Deployment
metadata:
  name: nbiservice
spec:
  selector:
    matchLabels:
      app: nbiservice
  replicas: 1
  template:
    metadata:
      labels:
        app: nbiservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: labs.etsi.org:5050/tfs/controller/nbi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
            # Metrics disabled for now. No NBI endpoint uses it and
            # causes "address already in use" when deploying multiple
            # gunicorn workers.
            #- containerPort: 9192
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: FLASK_ENV
              value: "production"  # normal value is "production", change to "development" if developing
            - name: IETF_NETWORK_RENDERER
              value: "LIBYANG"
          envFrom:
            - secretRef:
                name: kfk-kpi-data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 50   # NBI's gunicorn takes 30~40 seconds to bootstrap
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 50   # NBI's gunicorn takes 30~40 seconds to bootstrap
            periodSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              cpu: 150m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2048Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nbiservice
  labels:
    app: nbiservice
spec:
  type: ClusterIP
  selector:
    app: nbiservice
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    # Metrics disabled for now. No NBI endpoint uses it and
    # causes "address already in use" when deploying multiple
    # gunicorn workers.
    #- name: metrics
    #  protocol: TCP
    #  port: 9192
    #  targetPort: 9192
