apiVersion: apps/v1
kind: Deployment
metadata:
  name: simap-connectorservice
spec:
  selector:
    matchLabels:
      app: simap-connectorservice
  replicas: 1
  template:
    metadata:
      labels:
        app: simap-connectorservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: labs.etsi.org:5050/tfs/controller/simap_connector:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9090
            - containerPort: 9192
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: SIMAP_SERVER_SCHEME
              value: "http"
            - name: SIMAP_SERVER_ADDRESS
              # Assuming SIMAP Server is deployed in a local Docker container, as per:
              # - ./src/tests/tools/simap_server/build.sh
              # - ./src/tests/tools/simap_server/deploy.sh
              value: "172.17.0.1"
            - name: SIMAP_SERVER_PORT
              # Assuming SIMAP Server is deployed in a local Docker container, as per:
              # - ./src/tests/tools/simap_server/build.sh
              # - ./src/tests/tools/simap_server/deploy.sh
              value: "8080"
            - name: SIMAP_SERVER_USERNAME
              value: "admin"
            - name: SIMAP_SERVER_PASSWORD
              value: "admin"
            - name: CRDB_DATABASE
              value: "tfs_simap_connector"
          envFrom:
            - secretRef:
                name: crdb-data
            - secretRef:
                name: kfk-kpi-data
          startupProbe:
            grpc:
              port: 9090
            failureThreshold: 30
            periodSeconds: 1
          readinessProbe:
            grpc:
              port: 9090
          livenessProbe:
            grpc:
              port: 9090
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: simap-connectorservice
  labels:
    app: simap-connectorservice
spec:
  type: ClusterIP
  selector:
    app: simap-connectorservice
  ports:
    - name: grpc
      protocol: TCP
      port: 9090
      targetPort: 9090
    - name: metrics
      protocol: TCP
      port: 9192
      targetPort: 9192
