kind: Namespace
apiVersion: v1
metadata:
  name: mocks
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-nbi-dependencies
spec:
  selector:
    matchLabels:
      app: mock-nbi-dependencies
  replicas: 1
  template:
    metadata:
      labels:
        app: mock-nbi-dependencies
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: localhost:32000/tfs/mock-nbi-dependencies:test
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 10000
          env:
            - name: BIND_ADDRESS
              value: "0.0.0.0"
            - name: BIND_PORT
              value: "10000"
            - name: LOG_LEVEL
              value: "DEBUG"
          readinessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:10000"]
          livenessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:10000"]
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 700m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mock-nbi-dependencies
  labels:
    app: mock-nbi-dependencies
spec:
  type: ClusterIP
  selector:
    app: mock-nbi-dependencies
  ports:
    - name: grpc
      protocol: TCP
      port: 10000
      targetPort: 10000
