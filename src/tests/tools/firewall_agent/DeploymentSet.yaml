apiVersion: apps/v1
kind: Deployment
metadata:
  name: firewall-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: firewall-agent
  template:
    metadata:
      labels:
        app: firewall-agent
    spec:
      hostNetwork: true               # like --network host
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: firewall-agent
          image: firewall-agent:dev
          #image: localhost:32000/tfs/firewall-agent:dev
          imagePullPolicy: Always
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]      # like --cap-add=NET_ADMIN
            # privileged: true        # uncomment if your code needs full net admin / sysctl
          ports:
            - containerPort: 8888     # container listens on 8888 on the host now
              hostPort: 8888          # optional, but makes it explicit
          readinessProbe:
            httpGet:
              path: /restconf/data
              port: 8888
            initialDelaySeconds: 5
            timeoutSeconds: 1
          livenessProbe:
            httpGet:
              path: /restconf/data
              port: 8888
            initialDelaySeconds: 5
            timeoutSeconds: 1
