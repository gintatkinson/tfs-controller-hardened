   {% extends 'base.html' %}

   {% block content %}
       <h1>Optical View </h1>
   
       <div class="row">
        <div class="col-12 my-2">

        <div class="col-12 my-2">
          <h5 style="font-weight: bold;">Optical Configuration : </h5>
        </div>
        <div class="col-12">
          <div class="row">
            <div class="col">
              <a href="{{ url_for('opticalconfig.home') }}" class="btn btn-primary" style="margin-bottom: 10px;">
                
                    Optical Devices
              </a>

              <a href="{{ url_for('optical_link.home') }}" class="btn btn-primary mx-2" style="margin-bottom: 10px;">
                
                Optical Links
              </a>
            </div>

            

          </div>

        </div>
        <div class="col-12 my-1">
          <div style="width:100%;height:1px;background-color: gray;"></div>
        </div>
        <div class="col-12 my-2">
          <h5 style="font-weight: bold;">Optical Controller : </h5>
        </div>
        <div class="col-12">
          <div class="row">
            <div class="col">
              <a href="{{ url_for('optical_link.get_optical_links') }}" class="btn btn-primary" style="margin-bottom: 10px;">
                
                    Optical Links
              </a>
              <a href="{{ url_for('optical_link.get_optical_bands') }}" class="btn btn-primary mx-2" style="margin-bottom: 10px;">
                
                Optical Bands
              </a>

              <a href="{{ url_for('optical_link.get_lightpath') }}" class="btn btn-primary" style="margin-bottom: 10px;">
                    
                Light Paths
              </a>
            </div>
          

          </div>

        </div>
          
       
       </div>
   {% endblock %}
