{% extends 'base.html' %}

{% block content %}
<div class="row mb-3">
    <div class="col-sm-3">
        <button type="button" class="btn btn-success" onclick="window.location.href='{{ url_for('base_optical.home') }}'">
            <i class="bi bi-box-arrow-in-left"></i>
            Back to link list
        </button>
    </div>
   
</div>

<h1>Light Paths </h1>
{% for field_descriptor, field_value in light_paths.items() %}


<div class="row mt-3">
    <div class="col-sm-3">
    </div>

</div>        

<b>Name : {{field_descriptor}}</b>

<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th scope="col">Key</th>
            <th scope="col">Value</th>
        </tr>
    </thead>
    <tbody>
        {% for k, v in field_value.items() %}
          
            <tr>
               
                <td>
                    {{ k }}
                </td>
                <td>
                    {{ v }}
                </td>
            </tr>
            
        {% endfor %}
      
      
    </tbody>
</table>

{% endfor %}
<!-- Modal -->
<!-- Modal -->


{% endblock %}
